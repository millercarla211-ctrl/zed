version: "3.9"

services:
  metasearch:
    build: .
    ports:
      - "8888:8888"
    environment:
      - RUST_LOG=metasearch=info
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8888/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    command: ["metasearch", "serve", "--config", "config.toml"]
